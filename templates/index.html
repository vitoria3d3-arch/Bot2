<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Binance Futures Bot</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;600;700&family=Space+Grotesk:wght@400;600;700&display=swap');

  :root {
    --bg: #0a0b0f;
    --card: #12141c;
    --border: #1e2130;
    --text: #e0e0e8;
    --dim: #6b6e82;
    --green: #00e676;
    --red: #ff5252;
    --blue: #448aff;
    --yellow: #ffd740;
    --orange: #ff9100;
    --green-bg: rgba(0,230,118,.08);
    --red-bg: rgba(255,82,82,.08);
    --blue-bg: rgba(68,138,255,.12);
    --orange-bg: rgba(255,145,0,.10);
  }

  * { margin:0; padding:0; box-sizing:border-box; }

  body {
    background: var(--bg);
    color: var(--text);
    font-family: 'Space Grotesk', sans-serif;
    min-height: 100vh;
  }

  /* --- Header --- */
  header {
    padding: 18px 32px;
    border-bottom: 1px solid var(--border);
    display: flex;
    align-items: center;
    gap: 16px;
    flex-wrap: wrap;
  }

  header h1 {
    font-size: 20px;
    font-weight: 700;
    letter-spacing: -0.5px;
  }
  header h1 span { color: var(--yellow); }

  .status-dot {
    width: 8px; height: 8px;
    border-radius: 50%;
    background: var(--green);
    animation: pulse 2s infinite;
  }

  @keyframes pulse { 0%,100%{opacity:1;} 50%{opacity:.3;} }

  .server-ip {
    margin-left: auto;
    display: flex;
    align-items: center;
    gap: 8px;
    background: var(--bg);
    border: 1px solid var(--border);
    padding: 6px 14px;
    border-radius: 8px;
    cursor: pointer;
    transition: border-color .2s;
    position: relative;
  }
  .server-ip:hover { border-color: var(--yellow); }
  .ip-label {
    font-family: 'JetBrains Mono', monospace;
    font-size: 10px;
    color: var(--dim);
    letter-spacing: .5px;
  }
  .ip-value {
    font-family: 'JetBrains Mono', monospace;
    font-size: 13px;
    color: var(--yellow);
    font-weight: 600;
  }
  .ip-copied {
    font-family: 'JetBrains Mono', monospace;
    font-size: 10px;
    color: var(--green);
    opacity: 0;
    transition: opacity .3s;
    position: absolute;
    right: 14px;
    top: -18px;
    background: var(--card);
    padding: 2px 8px;
    border-radius: 4px;
    border: 1px solid var(--green);
    pointer-events: none;
  }
  .ip-copied.show { opacity: 1; }

  /* --- Grid --- */
  .grid {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 16px;
    padding: 24px 32px;
    max-width: 1400px;
    margin: 0 auto;
  }
  @media (max-width: 900px) { .grid { grid-template-columns: 1fr; } }

  /* --- Slot card --- */
  .slot {
    background: var(--card);
    border: 1px solid var(--border);
    border-radius: 12px;
    padding: 20px;
  }

  .slot-header {
    display: flex;
    justify-content: space-between;
    align-items: center;
    margin-bottom: 14px;
  }

  .slot-header-left {
    display: flex;
    align-items: center;
    gap: 10px;
  }

  .slot-title {
    font-family: 'JetBrains Mono', monospace;
    font-size: 14px;
    font-weight: 600;
    color: var(--dim);
  }

  .slot-badge {
    font-size: 11px;
    padding: 3px 10px;
    border-radius: 20px;
    font-weight: 600;
    text-transform: uppercase;
    letter-spacing: .5px;
  }
  .badge-stopped  { background: var(--border); color: var(--dim); }
  .badge-running  { background: var(--green-bg); color: var(--green); }
  .badge-error    { background: var(--red-bg); color: var(--red); }
  .badge-starting { background: var(--blue-bg); color: var(--blue); }

  /* --- Mode toggle --- */
  .mode-toggle {
    display: flex;
    align-items: center;
    gap: 8px;
    font-family: 'JetBrains Mono', monospace;
    font-size: 11px;
  }
  .mode-toggle .mode-label {
    font-weight: 600;
    letter-spacing: .5px;
    transition: color .2s;
  }
  .mode-toggle .mode-label.active-live { color: var(--red); }
  .mode-toggle .mode-label.active-demo { color: var(--orange); }
  .mode-toggle .mode-label.inactive { color: var(--dim); }

  .toggle-switch {
    position: relative;
    width: 40px;
    height: 20px;
    cursor: pointer;
  }
  .toggle-switch input { opacity:0; width:0; height:0; position:absolute; }
  .toggle-track {
    position: absolute;
    inset: 0;
    background: var(--red);
    border-radius: 10px;
    transition: background .3s;
  }
  .toggle-switch input:checked + .toggle-track { background: var(--orange); }
  .toggle-thumb {
    position: absolute;
    top: 2px;
    left: 2px;
    width: 16px;
    height: 16px;
    background: #fff;
    border-radius: 50%;
    transition: transform .3s;
    pointer-events: none;
  }
  .toggle-switch input:checked ~ .toggle-thumb { transform: translateX(20px); }

  /* --- Balance bar --- */
  .balance-bar {
    display: flex;
    align-items: center;
    gap: 8px;
    margin-bottom: 12px;
    min-height: 28px;
    flex-wrap: wrap;
  }
  .balance-chip {
    display: inline-flex;
    align-items: center;
    gap: 4px;
    background: var(--bg);
    border: 1px solid var(--border);
    border-radius: 6px;
    padding: 4px 10px;
    font-family: 'JetBrains Mono', monospace;
    font-size: 11px;
  }
  .balance-chip .asset { color: var(--dim); }
  .balance-chip .amount { color: var(--green); font-weight: 600; }
  .balance-chip .avail { color: var(--dim); font-size: 10px; }

  .btn-connect {
    background: var(--blue-bg);
    border: 1px solid rgba(68,138,255,.3);
    color: var(--blue);
    padding: 4px 12px;
    border-radius: 6px;
    font-size: 11px;
    font-weight: 600;
    cursor: pointer;
    font-family: 'JetBrains Mono', monospace;
    transition: background .2s;
  }
  .btn-connect:hover { background: rgba(68,138,255,.2); }
  .btn-connect:disabled { opacity: .4; cursor: not-allowed; }

  .balance-status {
    font-family: 'JetBrains Mono', monospace;
    font-size: 11px;
    color: var(--dim);
  }
  .balance-error {
    font-family: 'JetBrains Mono', monospace;
    font-size: 11px;
    color: var(--red);
  }

  .mode-badge-small {
    font-size: 9px;
    padding: 1px 6px;
    border-radius: 4px;
    font-weight: 700;
    letter-spacing: .5px;
    text-transform: uppercase;
  }
  .mode-live { background: var(--red-bg); color: var(--red); }
  .mode-demo { background: var(--orange-bg); color: var(--orange); }

  /* --- Trade Container --- */
  .trades-container {
    margin-top: 16px;
    display: flex;
    flex-direction: column;
    gap: 12px;
  }

  .trade-item {
    background: var(--bg);
    border: 1px solid var(--border);
    border-radius: 8px;
    padding: 12px;
    position: relative;
    transition: border-color .2s;
  }
  .trade-item:hover { border-color: var(--border); }
  
  .trade-item-header {
    display: flex;
    justify-content: space-between;
    align-items: flex-start;
    margin-bottom: 8px;
  }

  .trade-item-info {
    display: flex;
    flex-direction: column;
    gap: 2px;
  }

  .trade-symbol {
    font-family: 'JetBrains Mono', monospace;
    font-size: 13px;
    font-weight: 700;
    color: var(--yellow);
  }

  .trade-params {
    font-size: 10px;
    color: var(--dim);
    font-family: 'JetBrains Mono', monospace;
  }

  .trade-status-row {
    display: flex;
    align-items: center;
    gap: 12px;
    margin-top: 6px;
    font-family: 'JetBrains Mono', monospace;
    font-size: 11px;
  }

  .btn-stop-small {
    padding: 4px 10px;
    font-size: 10px;
    background: var(--red);
    color: #fff;
    border-radius: 4px;
    text-transform: uppercase;
    font-weight: 700;
    cursor: pointer;
  }

  .add-trade-form {
    background: var(--bg);
    border: 1px dashed var(--border);
    border-radius: 8px;
    padding: 14px;
    margin-top: 12px;
  }

  .add-trade-form.hidden { display: none; }

  .btn-add-toggle {
    width: 100%;
    background: var(--border);
    color: var(--text);
    padding: 8px;
    border-radius: 8px;
    font-size: 12px;
    font-weight: 600;
    margin-top: 12px;
    border: 1px solid var(--border);
    cursor: pointer;
    transition: background .2s;
  }
  .btn-add-toggle:hover { background: var(--card); }

  /* --- Form --- */
  .form-row {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 8px;
    margin-bottom: 8px;
  }
  .form-row.full { grid-template-columns: 1fr; }

  label {
    font-size: 11px;
    color: var(--dim);
    display: block;
    margin-bottom: 3px;
    font-family: 'JetBrains Mono', monospace;
  }

  input, select {
    width: 100%;
    background: var(--bg);
    border: 1px solid var(--border);
    color: var(--text);
    padding: 8px 10px;
    border-radius: 6px;
    font-size: 13px;
    font-family: 'JetBrains Mono', monospace;
    outline: none;
    transition: border-color .2s;
  }
  input:focus, select:focus { border-color: var(--blue); }
  input:disabled, select:disabled { opacity: .4; cursor: not-allowed; }

  /* --- Buttons --- */
  .btn-row { display: flex; gap: 8px; margin-top: 12px; }

  button {
    flex: 1;
    padding: 10px;
    border: none;
    border-radius: 8px;
    font-size: 13px;
    font-weight: 700;
    cursor: pointer;
    font-family: 'Space Grotesk', sans-serif;
    transition: opacity .2s;
    text-transform: uppercase;
    letter-spacing: .5px;
  }
  button:hover { opacity: .85; }
  button:disabled { opacity: .3; cursor: not-allowed; }

  .btn-start { background: var(--green); color: #000; }
  .btn-stop  { background: var(--red); color: #fff; }

  /* --- Log / info --- */
  .log-box {
    margin-top: 12px;
    background: var(--bg);
    border: 1px solid var(--border);
    border-radius: 8px;
    padding: 10px;
    height: 140px;
    overflow-y: auto;
    font-family: 'JetBrains Mono', monospace;
    font-size: 11px;
    line-height: 1.7;
    color: var(--dim);
  }
  .log-box .entry { white-space: nowrap; }

  .info-bar {
    margin-top: 8px;
    display: flex;
    gap: 16px;
    font-size: 12px;
    font-family: 'JetBrains Mono', monospace;
  }
  .info-bar span  { color: var(--dim); }
  .info-bar strong { color: var(--text); }

  .log-box::-webkit-scrollbar { width: 4px; }
  .log-box::-webkit-scrollbar-track { background: transparent; }
  .log-box::-webkit-scrollbar-thumb { background: var(--border); border-radius: 2px; }
</style>
</head>
<body>

<header>
  <div class="status-dot"></div>
  <h1>Binance Futures <span>Bot</span></h1>
  <div class="server-ip" id="serverIp" onclick="copyIP()" title="Clique para copiar — use este IP no whitelist da API Binance">
    <span class="ip-label">SERVER IP</span>
    <span class="ip-value" id="ipValue">carregando...</span>
    <span class="ip-copied" id="ipCopied">copiado!</span>
  </div>
</header>

<div class="grid" id="slotsGrid"></div>

<script>
const SLOTS = 4;
const slotActive = [false, false, false, false];

function createSlotHTML(i) {
  return `
  <div class="slot" id="slot${i}">
    <div class="slot-header">
      <div class="slot-header-left">
        <div class="slot-title">API SLOT #${i+1}</div>
        <div class="slot-badge badge-stopped" id="badge${i}">Inativo</div>
      </div>
      <div class="mode-toggle" id="modeToggle${i}">
        <span class="mode-label active-live" id="liveLabel${i}">LIVE</span>
        <label class="toggle-switch" title="Alterne entre modo Real (Live) e Testnet (Demo)">
          <input type="checkbox" id="mode${i}" onchange="onModeChange(${i})">
          <div class="toggle-track"></div>
          <div class="toggle-thumb"></div>
        </label>
        <span class="mode-label inactive" id="demoLabel${i}">DEMO</span>
      </div>
    </div>

    <div class="balance-bar" id="balBar${i}">
      <button class="btn-connect" id="btnConnect${i}" onclick="fetchBalance(${i})">Conectar</button>
      <span class="balance-status" id="balStatus${i}"></span>
    </div>

    <div class="form-row">
      <div><label>API Key</label><input type="password" id="key${i}" placeholder="api key"></div>
      <div><label>Secret</label><input type="password" id="sec${i}" placeholder="secret"></div>
    </div>

    <button class="btn-add-toggle" onclick="toggleAddForm(${i})">+ ADICIONAR NOVA OPERAÇÃO</button>

    <div class="add-trade-form hidden" id="addForm${i}">
      <div class="form-row">
        <div><label>Symbol (Par)</label><input id="sym${i}" value="BTCUSDC" placeholder="BTCUSDC"></div>
        <div><label>Direção</label>
          <select id="dir${i}">
            <option value="LONG">LONG</option>
            <option value="SHORT">SHORT</option>
          </select>
        </div>
      </div>
      <div class="form-row">
        <div><label>Variação % (TP)</label><input type="number" id="pct${i}" value="0.5" step="0.01" placeholder="0.5"></div>
        <div><label>Margem USDC ($)</label><input type="number" id="qty${i}" value="10" step="1" placeholder="10"></div>
      </div>
      <div class="form-row">
        <div><label>Leverage</label><input type="number" id="lev${i}" value="10" placeholder="10"></div>
        <div><label>Preço Entrada (Opt)</label><input type="number" id="ep${i}" step="0.00000001" placeholder="Auto"></div>
      </div>
      <div class="btn-row">
        <button class="btn-start" onclick="startTrade(${i})">Lançar Ordem</button>
      </div>
    </div>

    <div class="trades-container" id="trades${i}">
      <!-- Trades will be injected here -->
    </div>
  </div>`;
}

const grid = document.getElementById('slotsGrid');
for (let i = 0; i < SLOTS; i++) grid.innerHTML += createSlotHTML(i);

/* --- Mode toggle --- */
function getMode(i) {
  return document.getElementById('mode'+i).checked ? 'demo' : 'live';
}

function onModeChange(i) {
  const isDemo = document.getElementById('mode'+i).checked;
  const liveL  = document.getElementById('liveLabel'+i);
  const demoL  = document.getElementById('demoLabel'+i);
  if (isDemo) {
    liveL.className = 'mode-label inactive';
    demoL.className = 'mode-label active-demo';
  } else {
    liveL.className = 'mode-label active-live';
    demoL.className = 'mode-label inactive';
  }
  // Clear balance on mode change
  clearBalance(i);
}

/* --- Balance --- */
function clearBalance(i) {
  const bar = document.getElementById('balBar'+i);
  // Remove old chips
  bar.querySelectorAll('.balance-chip, .balance-error, .mode-badge-small').forEach(el => el.remove());
  document.getElementById('balStatus'+i).textContent = '';
  document.getElementById('btnConnect'+i).style.display = '';
}

async function fetchBalance(i) {
  const apiKey = document.getElementById('key'+i).value.trim();
  const secret = document.getElementById('sec'+i).value.trim();
  if (!apiKey || !secret) return alert('Preencha API Key e Secret primeiro');

  const btn = document.getElementById('btnConnect'+i);
  const statusEl = document.getElementById('balStatus'+i);
  btn.disabled = true;
  statusEl.textContent = 'conectando...';
  statusEl.className = 'balance-status';

  // Remove old chips
  const bar = document.getElementById('balBar'+i);
  bar.querySelectorAll('.balance-chip, .balance-error, .mode-badge-small').forEach(el => el.remove());

  const mode = getMode(i);
  try {
    const r = await fetch('/api/balance', {
      method: 'POST',
      headers: {'Content-Type':'application/json'},
      body: JSON.stringify({ api_key: apiKey, secret, mode }),
    });
    const d = await r.json();
    btn.disabled = false;

    if (d.error) {
      statusEl.textContent = d.error;
      statusEl.className = 'balance-error';
      return;
    }

    statusEl.textContent = '';
    btn.style.display = 'none';

    // Mode badge
    const modeBadge = document.createElement('span');
    modeBadge.className = 'mode-badge-small ' + (mode === 'demo' ? 'mode-demo' : 'mode-live');
    modeBadge.textContent = mode === 'demo' ? 'TESTNET' : 'LIVE';
    bar.appendChild(modeBadge);

    // Balance chips
    const balances = d.balances || [];
    if (balances.length === 0) {
      const chip = document.createElement('span');
      chip.className = 'balance-status';
      chip.textContent = 'Sem saldo';
      bar.appendChild(chip);
    } else {
      balances.forEach(b => {
        const chip = document.createElement('span');
        chip.className = 'balance-chip';
        chip.innerHTML = '<span class="asset">' + esc(b.asset) + '</span>'
          + '<span class="amount">' + esc(String(b.balance)) + '</span>'
          + '<span class="avail">(disp: ' + esc(String(b.available)) + ')</span>';
        bar.appendChild(chip);
      });
    }

    // Add refresh button
    const refreshBtn = document.createElement('button');
    refreshBtn.className = 'btn-connect';
    refreshBtn.textContent = '↻';
    refreshBtn.title = 'Atualizar saldo';
    refreshBtn.style.padding = '4px 8px';
    refreshBtn.onclick = () => {
      clearBalance(i);
      fetchBalance(i);
    };
    bar.appendChild(refreshBtn);

  } catch(e) {
    btn.disabled = false;
    statusEl.textContent = 'Erro de conexão';
    statusEl.className = 'balance-error';
  }
}

function toggleAddForm(i) {
  const form = document.getElementById('addForm'+i);
  form.classList.toggle('hidden');
}

/* --- Start / Stop --- */
async function startTrade(i) {
  const body = {
    slot: i,
    api_key: document.getElementById('key'+i).value,
    secret:  document.getElementById('sec'+i).value,
    symbol:  document.getElementById('sym'+i).value,
    direction: document.getElementById('dir'+i).value,
    pct:     document.getElementById('pct'+i).value,
    qty:     document.getElementById('qty'+i).value,
    leverage: document.getElementById('lev'+i).value,
    entry_price: document.getElementById('ep'+i).value,
    mode:    getMode(i),
  };
  if (!body.api_key || !body.secret) return alert('Preencha API Key e Secret');
  
  try {
    const r = await fetch('/api/start', {method:'POST', headers:{'Content-Type':'application/json'}, body:JSON.stringify(body)});
    const d = await r.json();
    if (d.error) alert(d.error);
    else {
        toggleAddForm(i); // Hide form
    }
  } catch(e) {
    alert('Erro de conexão: ' + e.message);
  }
}

async function stopTrade(tradeId) {
  try {
    await fetch('/api/stop', {method:'POST', headers:{'Content-Type':'application/json'}, body:JSON.stringify({trade_id:tradeId})});
  } catch(e) {
    alert('Erro de conexão: ' + e.message);
  }
}

/* --- Helpers --- */
function esc(str) {
  const div = document.createElement('div');
  div.textContent = str;
  return div.innerHTML;
}

function createTradeItemHTML(t) {
  return `
  <div class="trade-item" data-id="${t.trade_id}">
    <div class="trade-item-header">
      <div class="trade-item-info">
        <span class="trade-symbol">${t.symbol}</span>
        <span class="trade-params">${t.direction} | ${t.pct}% | $${t.qty} | ${t.leverage}x</span>
      </div>
      <button class="btn-stop-small" onclick="stopTrade('${t.trade_id}')">PARAR</button>
    </div>
    
    <div class="trade-status-row">
      <span class="slot-badge badge-${t.status}">${t.status}</span>
      <span style="color:var(--dim)">Ciclos: <strong class="cycles-count">${t.cycles}</strong></span>
      <span style="color:var(--dim)">Ordem: <strong class="order-info">${t.current_order ? t.current_order.side + ' @ ' + t.current_order.price : '—'}</strong></span>
    </div>

    <div class="log-box" style="height: 80px; margin-top: 8px;">
       ${t.log.map(l => '<div class="entry">' + esc(l) + '</div>').join('')}
    </div>
  </div>`;
}

/* --- Real-Time Streaming (SSE) --- */
function processData(data) {
  data.forEach((slot, i) => {
    const container = document.getElementById('trades'+i);
    const trades = slot.trades || [];
    const newIds = trades.map(t => t.trade_id);

    // 1. Remove deleted trades
    Array.from(container.children).forEach(el => {
      const id = el.getAttribute('data-id');
      if (!newIds.includes(id)) el.remove();
    });

    // 2. Update or Add
    trades.forEach(t => {
      let el = container.querySelector(`[data-id="${t.trade_id}"]`);
      if (el) {
        // Update status badge
        const badge = el.querySelector('.slot-badge');
        const badgeClass = `slot-badge badge-${t.status}`;
        if (badge.className !== badgeClass) {
          badge.className = badgeClass;
          badge.textContent = t.status;
        }
        // Update Cycles
        const cyc = el.querySelector('.cycles-count');
        if (cyc.textContent !== String(t.cycles)) cyc.textContent = t.cycles;
        
        // Update Order Info
        const ord = el.querySelector('.order-info');
        const ordTxt = t.current_order ? t.current_order.side + ' @ ' + t.current_order.price : '—';
        if (ord.textContent !== ordTxt) ord.textContent = ordTxt;

        // Update Log
        const logBox = el.querySelector('.log-box');
        const logHtml = t.log.map(l => '<div class="entry">' + esc(l) + '</div>').join('');
        if (logBox.innerHTML !== logHtml) {
          const wasAtBottom = logBox.scrollHeight - logBox.clientHeight <= logBox.scrollTop + 5;
          logBox.innerHTML = logHtml;
          if (wasAtBottom) logBox.scrollTop = logBox.scrollHeight;
        }
      } else {
        // Add new trade
        container.insertAdjacentHTML('beforeend', createTradeItemHTML(t));
        const newEl = container.querySelector(`[data-id="${t.trade_id}"]`);
        const lb = newEl.querySelector('.log-box');
        lb.scrollTop = lb.scrollHeight;
      }
    });
  });
}

function initStreaming() {
  console.log("Initializing Real-Time Stream...");
  const source = new EventSource('/api/events');
  
  source.onmessage = (event) => {
    try {
      const data = JSON.parse(event.data);
      processData(data);
    } catch(e) {
      console.error("SSE Parse Error:", e);
    }
  };

  source.onerror = (err) => {
    console.warn("SSE connection lost, retrying...");
    // Browser automatically handles reconnection for EventSource
  };
}

// Start streaming when page loads
initStreaming();

/* --- Server IP --- */
async function fetchServerIP() {
  try {
    const r = await fetch('/api/server-ip');
    const d = await r.json();
    document.getElementById('ipValue').textContent = d.ip || 'unavailable';
  } catch(e) {
    document.getElementById('ipValue').textContent = 'erro';
  }
}

function copyIP() {
  const ip = document.getElementById('ipValue').textContent;
  if (!ip || ip === 'carregando...' || ip === 'erro') return;
  navigator.clipboard.writeText(ip).then(() => {
    const el = document.getElementById('ipCopied');
    el.classList.add('show');
    setTimeout(() => el.classList.remove('show'), 1500);
  });
}

fetchServerIP();
</script>
